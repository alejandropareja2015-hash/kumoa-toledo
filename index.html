<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kumoa Admin">
<title>Kumoa Admin</title>
<link rel="manifest" href="/admin/manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--card:#1e293b;--border:#334155;--accent:#f59e0b;--accent-d:#d97706;
  --text:#f1f5f9;--muted:#94a3b8;--danger:#ef4444;--ok:#10b981;
  --radius:14px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

/* ── Login ── */
#screen-login{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:32px 24px;
}
.login-logo{font-size:3rem;margin-bottom:8px}
.login-title{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.login-sub{font-size:.9rem;color:var(--muted);margin-bottom:40px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;width:100%;max-width:340px}
.login-card label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.login-card input{
  width:100%;background:#0f172a;border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;font-size:1rem;color:var(--text);outline:none;
  transition:border-color .2s;
}
.login-card input:focus{border-color:var(--accent)}
.btn-primary{
  display:block;width:100%;margin-top:20px;padding:16px;
  background:var(--accent);color:#0f172a;font-size:1rem;font-weight:800;
  border:none;border-radius:10px;cursor:pointer;transition:background .2s;letter-spacing:.03em;
}
.btn-primary:active{background:var(--accent-d)}
#login-error{color:var(--danger);font-size:.85rem;text-align:center;margin-top:12px;min-height:20px}

/* ── App shell ── */
#screen-app{display:none;flex-direction:column;height:100%}
#screen-app.visible{display:flex}

header{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top,0px));
  background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;
}
header h1{font-size:1.25rem;font-weight:800;flex:1}
.btn-icon{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:8px;border-radius:8px}
.btn-icon:active{background:var(--border)}

/* Tabs */
.tabs-bar{
  display:flex;gap:6px;overflow-x:auto;padding:12px 16px;
  background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;
  scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#0f172a}

/* Items list */
#items-list{flex:1;overflow-y:auto;padding:12px 16px 100px;-webkit-overflow-scrolling:touch}

.sep{
  font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;
  color:var(--accent);padding:20px 0 8px;
}
.sep:first-child{padding-top:8px}

.item-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;
}
.item-row:active{border-color:var(--accent)}
.item-row.unavailable{opacity:.5}
.item-thumb{
  width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;overflow:hidden;
}
.item-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.item-info{flex:1;min-width:0}
.item-name{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:.85rem;color:var(--accent);font-weight:600;margin-top:2px}
.item-unavail-badge{font-size:.7rem;color:var(--danger);font-weight:700;margin-top:2px}

/* Toggle switch */
.switch{position:relative;width:48px;height:28px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.slider{
  position:absolute;inset:0;background:var(--border);border-radius:28px;
  transition:background .2s;cursor:pointer;
}
.slider::before{
  content:'';position:absolute;left:3px;top:3px;
  width:22px;height:22px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.switch input:checked + .slider{background:var(--ok)}
.switch input:checked + .slider::before{transform:translateX(20px)}

/* FAB */
#fab{
  position:fixed;right:20px;bottom:calc(24px + var(--safe-b));
  width:58px;height:58px;border-radius:50%;background:var(--accent);
  border:none;font-size:1.6rem;color:#0f172a;cursor:pointer;
  box-shadow:0 8px 24px rgba(245,158,11,.4);z-index:100;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .15s;
}
#fab:active{transform:scale(.93);background:var(--accent-d)}

/* Bottom sheet modal */
.sheet-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  backdrop-filter:blur(4px);
}
.sheet-overlay.open{display:flex;align-items:flex-end}
.sheet{
  width:100%;max-height:92vh;background:var(--card);
  border-radius:20px 20px 0 0;overflow-y:auto;
  padding:0 0 calc(24px + var(--safe-b));
  animation:slideUp .28s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:36px;height:4px;background:var(--border);border-radius:4px;
  margin:12px auto 0;
}
.sheet-title{
  font-size:1.1rem;font-weight:800;padding:16px 20px 12px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;
}
.sheet-body{padding:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;background:#0f172a;border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:.95rem;color:var(--text);outline:none;resize:vertical;
  transition:border-color .2s;font-family:inherit;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--bg)}
.foto-preview{
  width:100%;height:140px;border-radius:10px;object-fit:cover;
  margin-bottom:10px;background:var(--border);display:none;
}
.foto-preview.visible{display:block}
.btn-upload{
  width:100%;padding:12px;border:2px dashed var(--border);border-radius:10px;
  background:transparent;color:var(--muted);font-size:.9rem;cursor:pointer;
  text-align:center;transition:border-color .2s,color .2s;
}
.btn-upload:active{border-color:var(--accent);color:var(--accent)}
.sheet-actions{display:flex;gap:10px;padding:0 20px;margin-top:8px}
.btn-save{
  flex:1;padding:16px;background:var(--accent);color:#0f172a;
  font-size:1rem;font-weight:800;border:none;border-radius:10px;cursor:pointer;
}
.btn-save:active{background:var(--accent-d)}
.btn-delete{
  padding:16px 20px;background:rgba(239,68,68,.15);color:var(--danger);
  font-size:1rem;font-weight:700;border:1px solid rgba(239,68,68,.3);border-radius:10px;cursor:pointer;
}
.btn-delete:active{background:rgba(239,68,68,.3)}

/* Toast */
#toast{
  position:fixed;bottom:calc(90px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 20px;font-size:.9rem;font-weight:600;z-index:500;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--ok);color:var(--ok)}
#toast.err{border-color:var(--danger);color:var(--danger)}

/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-logo">🍔</div>
  <div class="login-title">Kumoa Admin</div>
  <div class="login-sub">Panel de gestión del menú</div>
  <div class="login-card">
    <label for="pwd">Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" onclick="login()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="screen-app">
  <header>
    <h1>Kumoa Admin</h1>
    <span id="unsaved-count" style="font-size:.75rem;color:var(--accent);font-weight:700;display:none"></span>
    <button class="btn-icon" onclick="logout()" title="Salir">⏏</button>
  </header>

  <div class="tabs-bar" id="tabs-bar"></div>

  <div id="items-list"><div id="loading">Cargando menú…</div></div>

  <button id="fab" onclick="abrirModal(null)">+</button>
</div>

<!-- EDIT / ADD MODAL -->
<div class="sheet-overlay" id="sheet-overlay" onclick="cerrarModal(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span id="sheet-titulo">Nuevo plato</span>
      <button class="btn-icon" onclick="cerrarModal(null)" style="font-size:1.2rem">✕</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="f-id">
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="f-nombre" placeholder="Nombre del plato">
      </div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="f-desc" rows="2" placeholder="Descripción (opcional)"></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <div class="field" style="flex:1">
          <label>Precio (€)</label>
          <input type="number" id="f-precio" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="field" style="flex:1">
          <label>Categoría</label>
          <select id="f-categoria">
            <option value="hamburguesas">Hamburguesas</option>
            <option value="compartir">Para Compartir</option>
            <option value="carne">Carne</option>
            <option value="tostas">Tostas</option>
            <option value="postres">Postres</option>
            <option value="bebidas">Bebidas</option>
            <option value="extras">Extras</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Subcategoría <span style="text-transform:none;font-weight:400;color:var(--muted)">(opcional)</span></label>
        <input type="text" id="f-subcat" placeholder="p.ej. Entrantes, Cervezas…">
      </div>
      <div class="field">
        <label>Foto</label>
        <img id="f-foto-preview" class="foto-preview" src="" alt="">
        <button class="btn-upload" onclick="document.getElementById('f-foto-input').click()">
          📷 Subir foto
        </button>
        <input type="file" id="f-foto-input" accept="image/*" style="display:none" onchange="subirFoto(this)">
        <input type="hidden" id="f-foto">
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-save" onclick="guardar()">Guardar</button>
      <button class="btn-delete" id="btn-delete" onclick="borrar()" style="display:none">Borrar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CATS = {
  hamburguesas:'Hamburguesas', compartir:'Para Compartir', carne:'Carne',
  tostas:'Tostas & Sándwich', postres:'Postres', bebidas:'Bebidas', extras:'Salsas & Extras'
};

let menu = [];
let catActual = 'hamburguesas';

// ── Boot ──────────────────────────────────────────────
(async () => {
  const r = await fetch('/api/auth');
  const { autenticado } = await r.json();
  if (autenticado) mostrarApp();
  else mostrarLogin();
})();

function mostrarLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-app').classList.remove('visible');
  setTimeout(() => document.getElementById('pwd').focus(), 100);
}

function mostrarApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').classList.add('visible');
  renderTabs();
  cargarMenu();
}

// ── Auth ──────────────────────────────────────────────
async function login() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!pwd) { err.textContent = 'Escribe la contraseña'; return; }
  const r = await fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pwd })
  });
  if (r.ok) { mostrarApp(); document.getElementById('pwd').value = ''; }
  else err.textContent = 'Contraseña incorrecta';
}

async function logout() {
  await fetch('/api/logout', { method:'POST' });
  mostrarLogin();
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// ── Tabs ──────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = Object.entries(CATS).map(([k, v]) =>
    `<button class="tab-btn${k === catActual ? ' active' : ''}" onclick="cambiarCat('${k}')">${v}</button>`
  ).join('');
}

function cambiarCat(cat) {
  catActual = cat;
  renderTabs();
  renderItems();
}

// ── Menu load & render ────────────────────────────────
async function cargarMenu() {
  const r = await fetch('/api/menu');
  menu = await r.json();
  renderItems();
}

function renderItems() {
  const lista = document.getElementById('items-list');
  const items = menu.filter(p => p.categoria === catActual);

  if (!items.length) {
    lista.innerHTML = `<div style="text-align:center;color:var(--muted);padding:60px 0">Sin platos en esta categoría</div>`;
    return;
  }

  // Group by subcategoria
  const groups = [];
  const seen = [];
  items.forEach(p => {
    const sub = p.subcategoria || '';
    if (!seen.includes(sub)) { seen.push(sub); groups.push({ sub, items: [] }); }
    groups.find(g => g.sub === sub).items.push(p);
  });

  lista.innerHTML = groups.map(g => `
    ${g.sub ? `<div class="sep">${g.sub}</div>` : ''}
    ${g.items.map(p => itemHTML(p)).join('')}
  `).join('');
}

function itemHTML(p) {
  const thumb = p.foto
    ? `<div class="item-thumb"><img src="/${p.foto}" loading="lazy" onerror="this.style.display='none'"></div>`
    : `<div class="item-thumb">🍽️</div>`;
  const price = p.precio ? p.precio.toFixed(2).replace('.',',') + '€' : '';
  const badge = p.disponible ? '' : '<div class="item-unavail-badge">● No disponible</div>';
  return `
    <div class="item-row${p.disponible ? '' : ' unavailable'}" onclick="abrirModal('${p.id}')">
      ${thumb}
      <div class="item-info">
        <div class="item-name">${p.nombre}</div>
        <div class="item-price">${price}</div>
        ${badge}
      </div>
      <label class="switch" onclick="event.stopPropagation()">
        <input type="checkbox" ${p.disponible ? 'checked' : ''} onchange="toggleDisponible('${p.id}',this)">
        <span class="slider"></span>
      </label>
    </div>`;
}

// ── Toggle disponible ─────────────────────────────────
async function toggleDisponible(id, checkbox) {
  const disponible = checkbox.checked;
  const r = await fetch(`/api/menu/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ disponible })
  });
  if (r.ok) {
    const idx = menu.findIndex(p => p.id === id);
    if (idx !== -1) menu[idx].disponible = disponible;
    renderItems();
    toast(disponible ? 'Disponible ✓' : 'Marcado no disponible', 'ok');
  } else {
    checkbox.checked = !disponible;
    toast('Error al guardar', 'err');
  }
}

// ── Modal ─────────────────────────────────────────────
function abrirModal(id) {
  const p = id ? menu.find(m => m.id === id) : null;
  document.getElementById('sheet-titulo').textContent = p ? 'Editar plato' : 'Nuevo plato';
  document.getElementById('f-id').value        = p ? p.id : '';
  document.getElementById('f-nombre').value    = p ? p.nombre : '';
  document.getElementById('f-desc').value      = p ? (p.descripcion || '') : '';
  document.getElementById('f-precio').value    = p ? p.precio : '';
  document.getElementById('f-categoria').value = p ? p.categoria : catActual;
  document.getElementById('f-subcat').value    = p ? (p.subcategoria || '') : '';
  document.getElementById('f-foto').value      = p ? (p.foto || '') : '';
  const preview = document.getElementById('f-foto-preview');
  if (p && p.foto) { preview.src = '/' + p.foto; preview.classList.add('visible'); }
  else { preview.src = ''; preview.classList.remove('visible'); }
  document.getElementById('btn-delete').style.display = p ? 'block' : 'none';
  document.getElementById('sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('f-nombre').focus(), 300);
}

function cerrarModal(e) {
  if (e && e.target !== document.getElementById('sheet-overlay')) return;
  document.getElementById('sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Upload foto ───────────────────────────────────────
async function subirFoto(input) {
  if (!input.files[0]) return;
  const fd = new FormData();
  fd.append('foto', input.files[0]);
  const r = await fetch('/api/upload', { method:'POST', body: fd });
  if (r.ok) {
    const { foto } = await r.json();
    document.getElementById('f-foto').value = foto;
    const prev = document.getElementById('f-foto-preview');
    prev.src = '/' + foto;
    prev.classList.add('visible');
  } else toast('Error al subir la foto', 'err');
}

// ── Guardar ───────────────────────────────────────────
async function guardar() {
  const id    = document.getElementById('f-id').value;
  const datos = {
    nombre:       document.getElementById('f-nombre').value.trim(),
    descripcion:  document.getElementById('f-desc').value.trim() || null,
    precio:       parseFloat(document.getElementById('f-precio').value) || 0,
    categoria:    document.getElementById('f-categoria').value,
    subcategoria: document.getElementById('f-subcat').value.trim() || null,
    foto:         document.getElementById('f-foto').value.trim() || null,
  };
  if (!datos.nombre) { toast('Escribe un nombre', 'err'); return; }

  const url    = id ? `/api/menu/${id}` : '/api/menu';
  const method = id ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(datos) });

  if (r.ok) {
    const plato = await r.json();
    if (id) {
      const i = menu.findIndex(p => p.id === id);
      if (i !== -1) menu[i] = plato;
    } else {
      menu.push(plato);
      catActual = plato.categoria;
      renderTabs();
    }
    renderItems();
    cerrarModal(null);
    toast(id ? 'Plato actualizado ✓' : 'Plato añadido ✓', 'ok');
  } else toast('Error al guardar', 'err');
}

// ── Borrar ────────────────────────────────────────────
async function borrar() {
  const id = document.getElementById('f-id').value;
  if (!id) return;
  if (!confirm('¿Borrar este plato?')) return;
  const r = await fetch(`/api/menu/${id}`, { method:'DELETE' });
  if (r.ok) {
    menu = menu.filter(p => p.id !== id);
    renderItems();
    cerrarModal(null);
    toast('Plato eliminado', 'ok');
  } else toast('Error al borrar', 'err');
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function toast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${tipo}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── PWA service worker ────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/admin/sw.js').catch(() => {});
}
</script>
</body>
</html>
